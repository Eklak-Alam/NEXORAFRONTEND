name: Frontend CI/CD

# Runs ONLY when code in the 'frontend' folder changes
on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

jobs:
  # ==========================================
  # JOB 1: Test the Code
  # ==========================================
  test-code:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Run Tests (If any exist)
        # Using --if-present so the pipeline doesn't crash if you haven't written tests yet!
        run: npm run test --if-present 

  # ==========================================
  # JOB 2: Build & Push Docker Image
  # ==========================================
  build-and-push:
    needs: test-code # This guarantees the image ONLY builds if tests pass
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🚀 Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          # Tags the image with 'latest' in your Docker Hub repo
          tags: eklakalam/cloud-task-manager-frontend:latest
          # This caching magic makes your Next.js multi-stage build insanely fast
          cache-from: type=registry,ref=eklakalam/cloud-task-manager-frontend:buildcache
          cache-to: type=registry,ref=eklakalam/cloud-task-manager-frontend:buildcache,mode=max

      - name: 🎉 Boom! Success
        run: echo "Frontend image successfully built and pushed to Docker Hub, man!"